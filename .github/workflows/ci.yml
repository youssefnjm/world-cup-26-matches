name: Docker and Vercel CI/CD Pipeline

on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - master

jobs:
  build-docker-push:
    runs-on: ubuntu-latest    
    steps:
     - name: Checkout code
       uses: actions/checkout@v4
     
     - name: Log into dockerhub
       uses: docker/login-action@v4
       with:
         username: mboulagh
         password: ${{ secrets.DOCKERHUB_TOKEN }}

     - name: Build and Push docker image
       uses: docker/build-push-action@v6
       with:
        context: .
        push: true
        tags: mboulagh/world-cup-2026:v1.0.0

